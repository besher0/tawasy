version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sugarprecision
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '55432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file:
      - ../../.env.example
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sugarprecision
      REDIS_URL: redis://redis:6379
      API_PORT: 3000
    ports:
      - '3000:3000'

volumes:
  postgres_data:
  redis_data:
